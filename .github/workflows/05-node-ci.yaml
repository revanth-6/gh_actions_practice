name: 05-Node-CI

on:
  push:
    branches:
      - main
jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Install and configure Node.js in the CI machine so I can run JavaScript projects.
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test